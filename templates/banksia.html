<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>VERV OS — Banksia Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',-apple-system,sans-serif;background:#F8F9FC;color:#1E293B;display:flex;min-height:100vh;overflow-x:hidden}
.bsb{width:220px;background:linear-gradient(180deg,#0F172A 0%,#1E293B 100%);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .25s ease}
.bsb .brand{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
.bsb .brand .logo{font-size:16px;font-weight:800;display:flex;align-items:center;gap:6px}
.bsb .brand .logo span{color:#3B82F6}
.bsb .brand .tag{font-size:9px;background:rgba(59,130,246,.15);color:#60A5FA;padding:1px 5px;border-radius:3px;margin-left:4px}
.bs-nav{padding:8px;flex:1;overflow-y:auto}
.ns{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:1.5px;padding:10px 10px 4px;font-weight:600}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;color:#94A3B8;text-decoration:none;font-size:12px;font-weight:500;cursor:pointer;margin-bottom:1px;transition:all .12s;min-height:34px}
.ni:hover{background:rgba(255,255,255,.06);color:#E2E8F0}
.ni.active{background:rgba(59,130,246,.15);color:#60A5FA;font-weight:600}
.ni .b-num{margin-left:auto;background:rgba(239,68,68,.2);color:#FCA5A5;font-size:9px;padding:1px 5px;border-radius:6px;font-weight:600}
.bs-user{margin:6px;padding:10px;border-radius:6px;background:rgba(255,255,255,.05);display:flex;align-items:center;gap:8px}
.bs-user .av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff;flex-shrink:0}
.bs-user .info{flex:1}
.bs-user .info .n{font-size:11px;font-weight:600;color:#E2E8F0}
.bs-user .info .r{font-size:9px;color:#64748B}
.bs-user .lo{width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#94A3B8;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;text-decoration:none}
.mt{display:none;position:fixed;top:8px;left:8px;z-index:200;width:32px;height:32px;border:none;border-radius:6px;background:#0F172A;color:#fff;font-size:16px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.so{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:99}
.bm{margin-left:220px;flex:1;min-height:100vh}
.bt{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#fff;border-bottom:1px solid #E2E8F0;position:sticky;top:0;z-index:50;min-height:48px}
.bt h2{font-size:15px;font-weight:700;color:#0F172A}
.bt .right{display:flex;align-items:center;gap:8px;font-size:11px;color:#64748B}
.bc{padding:12px 16px}
.og{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
.pc{background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.05);overflow:hidden;cursor:pointer;transition:all .12s;border:1px solid #F1F5F9}
.pc:hover{box-shadow:0 3px 8px rgba(0,0,0,.08);border-color:#E2E8F0}
.pch{padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
.pch .pn{font-size:13px;font-weight:600;color:#0F172A}
.pch .pa{font-size:10px;color:#64748B;margin-top:1px}
.pch .ex{font-size:14px;color:#94A3B8;transition:transform .2s}
.pch .ex.open{transform:rotate(90deg)}
.pcb{display:none;padding:0 14px 12px}
.pcb.open{display:block}
.uc{border-radius:6px;padding:10px 12px;border:1px solid #F1F5F9;margin-bottom:4px;cursor:pointer;transition:all .1s;display:flex;justify-content:space-between;align-items:center}
.uc:hover{border-color:#CBD5E1;background:#F8F9FC}
.uc .un{font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
.uc .ud{font-size:10px;color:#64748B}
.sd{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.sd.g{background:#22C55E}.sd.y{background:#F59E0B}.sd.b{background:#3B82F6}.sd.gr{background:#94A3B8}.sd.r{background:#EF4444}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.dc{background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.05);padding:14px 16px}
.dch{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dch h3{font-size:13px;font-weight:600}
.dv{display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
.dl{font-size:9px;color:#64748B;text-transform:uppercase;font-weight:600}
.dvv{font-size:12px;color:#1E293B;font-weight:500}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.sc{background:#fff;border-radius:8px;padding:12px 14px;border:1px solid #F1F5F9}
.sc .sv{font-size:22px;font-weight:800;color:#0F172A}
.sc .sl{font-size:10px;color:#64748B;margin-top:2px;text-transform:uppercase}
.sc .sv.r{color:#DC2626}.sc .sv.g{color:#16A34A}.sc .sv.b{color:#3B82F6}.sc .sv.o{color:#F97316}
.sb{display:inline-flex;align-items:center;padding:2px 7px;border-radius:12px;font-size:9px;font-weight:600;gap:3px}
.sb.g{background:#F0FDF4;color:#16A34A}.sb.y{background:#FFFBEB;color:#D97706}.sb.r{background:#FEF2F2;color:#DC2626}.sb.b{background:#EFF6FF;color:#2563EB}.sb.gr{background:#F1F5F9;color:#64748B}
.tl-item{display:flex;gap:10px;padding:8px 0;border-left:2px solid #3B82F6;padding-left:10px;margin-bottom:4px}
.tl-item .tt{font-size:12px;font-weight:500;color:#0F172A}
.tl-item .td{font-size:10px;color:#64748B}.tl-item .tm{font-size:9px;color:#94A3B8}
.ld{display:flex;align-items:center;justify-content:center;padding:30px;color:#94A3B8;gap:6px;font-size:13px}
.sp{width:14px;height:14px;border:2px solid #E2E8F0;border-top-color:#3B82F6;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{padding:12px;color:#DC2626;background:#FEF2F2;border-radius:6px;font-size:12px}
.empty{padding:16px;text-align:center;color:#94A3B8;font-size:12px}.bk{cursor:pointer;color:#3B82F6;font-weight:500;font-size:12px;display:inline-block;margin-bottom:10px}
@media(max-width:899px){
.bsb{transform:translateX(-100%);width:85vw;max-width:280px}.bsb.open{transform:translateX(0)}
.mt{display:flex}.so.show{display:block}.bm{margin-left:0}.bt{padding:8px 12px;padding-left:48px}.bc{padding:10px 12px}
.og{grid-template-columns:1fr}.dg{grid-template-columns:1fr}.sg{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){.sg{grid-template-columns:1fr}}
</style>
</head>
<body>
<button class="mt" id="mBtn" onclick="ts()">☰</button>
<div class="so" id="sOv" onclick="ts()"></div>
<aside class="bsb" id="sb">
<div class="brand"><div class="logo">VOS<span>.</span><span class="tag">BETA</span></div></div>
<nav class="bs-nav">
<div class="ns">Operations</div>
<div class="ni active" onclick="nav('dashboard')"><span>📊</span>Dashboard<span class="b-num" id="dBadge" style="display:none">0</span></div>
<div class="ni" onclick="nav('portfolio')"><span>🏢</span>Portfolio</div>
<div class="ni" onclick="nav('applicants')"><span>👤</span>Applicants</div>
<div class="ns">Finance</div>
<div class="ni" onclick="nav('finance')"><span>💰</span>Finance</div>
<div class="ns">People</div>
<div class="ni" onclick="nav('tenants')"><span>👥</span>Tenants</div>
<div class="ni" onclick="nav('landlords')"><span>🤝</span>Landlords</div>
<div class="ns">Intelligence</div>
<div class="ni" onclick="nav('attention')"><span>⚠️</span>Attention<span class="b-num" id="aBadge" style="display:none">0</span></div>
</nav>
<div class="bs-user">
<div class="av" id="uAv">S</div>
<div class="info"><div class="n" id="uName">Sami</div><div class="r" id="uRole">super_admin</div></div>
<a href="/api/auth/logout" class="lo" title="Sign out">✕</a>
</div>
</aside>
<div class="bm">
<div class="bt"><h2 id="pTitle">Dashboard</h2><div class="right" id="bStats"></div></div>
<div class="bc" id="bContent"></div>
</div>
<script>
var cv='dashboard',cp=null,cu=null,ct=null,cs=null;
function ts(){document.getElementById('sOv').classList.toggle('show');document.getElementById('sb').classList.toggle('open');}
document.querySelectorAll('.ni').forEach(function(e){e.addEventListener('click',function(){if(window.innerWidth<900)ts();});});
async function api(p,m,b){var o={};if(m){o.method=m;o.headers={'Content-Type':'application/json'};}if(b)o.body=JSON.stringify(b);var r=await fetch(p,o);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}
function nav(v,p,u,t,s){cv=v;cp=p||null;cu=u||null;ct=t||null;cs=s||null;
document.querySelectorAll('.ni').forEach(function(e){e.classList.remove('active');});
var titles={dashboard:'Dashboard',portfolio:'Portfolio',applicants:'Applicants',finance:'Finance',tenants:'Tenants',landlords:'Landlords',attention:'Attention'};
document.getElementById('pTitle').textContent=titles[v]||'Banksia OS';render();}
function rt(i){if(!i)return'';try{var d=new Date(i),s=Math.floor((new Date()-d)/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}catch(e){return'';}}
function sbs(s){var m={occupied:'g',vacant:'gr',reserved:'b',notice_served:'y',attention:'r',active:'g',periodic:'b',expired:'r',completed:'g',in_progress:'y',reported:'b',approved:'b',assigned:'y',confirmed:'g',protected:'g',pending:'y'};return '<span class="sb '+(m[s.toLowerCase()]||'gr')+'">'+s+'</span>';}
function sd(s){var m={occupied:'g',vacant:'gr',reserved:'b',notice_served:'y',attention:'r'};return '<span class="sd '+(m[s.toLowerCase()]||'gr')+'"></span>';}
function render(){var e=document.getElementById('bContent');
if(cs){loadTenantPage(e);return;}
if(ct){loadTenancyDetail(e);return;}
if(cu){loadUnitDetail(e);return;}
if(cp){loadPropertyDetail(e);return;}
if(cv==='dashboard')loadDashboard(e);else if(cv==='portfolio')loadPortfolio(e);else if(cv==='applicants')loadApplicants(e);else if(cv==='finance')loadFinance(e);else if(cv==='tenants')loadTenants(e);else if(cv==='landlords')loadLandlords(e);else if(cv==='attention')loadAttention(e);}

// ═══════════════════
// DASHBOARD
// ═══════════════════
async function loadDashboard(el){
el.innerHTML='<div class="ld"><div class="sp"></div> Loading...</div>';
try{var d=await api('/api/banksia/dashboard');
var h='<div class="sg">'+
'<div class="sc"><div class="sv '+(d.applicants_pending>0?'o':'b')+'">'+(d.applicants_pending||0)+'</div><div class="sl">Applicants Pending</div></div>'+
'<div class="sc"><div class="sv '+(d.referencing_outstanding>0?'b':'g')+'">'+(d.referencing_outstanding||0)+'</div><div class="sl">References Outstanding</div></div>'+
'<div class="sc"><div class="sv '+(d.guarantors_pending>0?'y':'g')+'">'+(d.guarantors_pending||0)+'</div><div class="sl">Guarantors Awaiting</div></div>'+
'<div class="sc"><div class="sv '+(d.agreements_pending>0?'b':'g')+'">'+(d.agreements_pending||0)+'</div><div class="sl">Agreements Pending</div></div>'+
'<div class="sc"><div class="sv '+(d.move_ins_this_week>0?'g':'gr')+'">'+(d.move_ins_this_week||0)+'</div><div class="sl">Move-Ins This Week</div></div>'+
'<div class="sc"><div class="sv '+(d.move_outs_this_week>0?'o':'gr')+'">'+(d.move_outs_this_week||0)+'</div><div class="sl">Move-Outs This Week</div></div>'+
'<div class="sc"><div class="sv '+(d.tenancies_ending_soon>0?'r':'g')+'">'+(d.tenancies_ending_soon||0)+'</div><div class="sl">Ending in 30 Days</div></div>'+
'<div class="sc"><div class="sv r">'+(d.tenants_in_arrears||0)+'</div><div class="sl">Arrears (Tenants)</div></div>'+
'<div class="sc"><div class="sv '+(d.deposits_pending>0?'r':'g')+'">'+(d.deposits_pending||0)+'</div><div class="sl">Deposits Unregistered</div></div>'+
'<div class="sc"><div class="sv '+(d.vacant_units>0?'o':'g')+'">'+(d.vacant_units||0)+'</div><div class="sl">Vacant Units</div></div>'+
'</div>'+
'<div style="margin-top:12px" class="dc"><div class="dch"><h3>Portfolio Summary</h3></div>'+
'<div class="sg" style="grid-template-columns:repeat(4,1fr)">'+
'<div class="sc"><div class="sv b">'+d.total_tenancies+'</div><div class="sl">Tenancies</div></div>'+
'<div class="sc"><div class="sv b">'+d.total_tenants+'</div><div class="sl">Tenants</div></div>'+
'<div class="sc"><div class="sv g">'+d.occupied_units+'</div><div class="sl">Occupied</div></div>'+
'<div class="sc"><div class="sv o">'+d.vacant_units+'</div><div class="sl">Vacant</div></div>'+
'</div></div>'+
'<div style="margin-top:12px" class="dc"><div class="dch"><h3>Arrears</h3></div>'+
'<div class="dvv">£'+(d.total_arrears||0).toLocaleString()+' total across '+d.tenants_in_arrears+' tenancies</div></div>';
document.getElementById('bStats').textContent=d.total_tenancies+' tenancies · '+d.occupied_units+' occupied';
el.innerHTML=h;}catch(e){el.innerHTML='<div class="err">'+e.message+'</div>';}}

// ═══════════════════
// PORTFOLIO — Tree
// ═══════════════════
async function loadPortfolio(el){
el.innerHTML='<div class="ld"><div class="sp"></div> Loading...</div>';
try{var d=await api('/api/banksia/portfolio');
var h='<div class="og">';
for(var i=0;i<d.properties.length;i++){var p=d.properties[i];
var sc=p.vacant>0?'#F59E0B':p.total_units==p.occupied?'#22C55E':'#3B82F6';
h+='<div class="pc"><div class="pch" onclick="toggleProp(this)">'+
'<div><div class="pn" style="border-left:3px solid '+sc+';padding-left:8px">'+p.name+'</div>'+
'<div class="pa">'+(p.address||'')+'</div></div>'+
'<div style="display:flex;align-items:center;gap:6px"><span style="font-size:10px;color:#64748B">'+p.occupied+'/'+p.total_units+'</span><span class="ex">\u25B6</span></div></div>'+
'<div class="pcb" id="pt'+p.id+'">';
for(var j=0;j<d.properties[i].units.length;j++){var u=d.properties[i].units[j];
h+='<div class="uc" onclick="nav(\'portfolio\','+p.id+','+u.id+')">'+
'<div class="un">'+sd(u.status)+u.name+'<span class="ud">'+sbs(u.status)+'</span></div>'+
'<div style="font-size:10px;color:#94A3B8">'+
((u.tenant&&u.tenant.full_name)?'👤 '+u.tenant.full_name:'— Vacant')+
(u.rent_amount?' · \u00A3'+u.rent_amount:'')+'</div></div>';}
h+='</div></div>';}
h+='</div>';el.innerHTML=h;}catch(e){el.innerHTML='<div class="err">'+e.message+'</div>';}}

function toggleProp(el){var id=el.parentNode.querySelector('.pcb');if(!id)return;id.classList.toggle('open');var ex=el.querySelector('.ex');if(ex)ex.classList.toggle('open');}

// ═══════════════════
// PROPERTY DETAIL
// ═══════════════════
async function loadPropertyDetail(el){
el.innerHTML='<div class="ld"><div class="sp"></div> Loading...</div>';
try{var d=await api('/api/banksia/properties/'+cp),p=d.property;
var h='<div class="bk" onclick="nav(\'portfolio\')">\u2190 Portfolio</div>'+
'<div class="dc"><div class="dch"><h3>'+p.name+'</h3><span>'+(p.address||'')+'</span></div>'+
'<div class="sg" style="grid-template-columns:repeat(4,1fr)">'+
'<div class="sc"><div class="sv g">'+d.occupied_count+'</div><div class="sl">Occupied</div></div>'+
'<div class="sc"><div class="sv o">'+d.vacant_count+'</div><div class="sl">Vacant</div></div>'+
'<div class="sc"><div class="sv b">'+d.unit_count+'</div><div class="sl">Units</div></div>'+
'<div class="sc"><div class="sv b">\u00A3'+(d.monthly_income||0).toLocaleString()+'</div><div class="sl">/mo</div></div>'+
'</div></div>';
h+='<div style="margin-top:12px">';
for(var i=0;i<d.units.length;i++){var u=d.units[i],tn=u.tenant||{};
var bc=u.status==='occupied'?'#22C55E':u.status==='vacant'?'#94A3B8':u.status==='attention'?'#EF4444':'#E2E8F0';
h+='<div class="uc" onclick="nav(\'portfolio\','+cp+','+u.id+')" style="border-left:3px solid '+bc+';border-radius:6px;padding:10px 12px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;border:1px solid #F1F5F9">'+
'<div><strong>'+sd(u.status)+u.name+'</strong><br><span style="color:#64748B;font-size:11px">'+(tn.full_name||'Vacant')+'</span></div>'+
'<div style="text-align:right;font-size:11px">'+(u.rent_amount?'\u00A3'+u.rent_amount:'')+'</div></div>';}
h+='</div>';el.innerHTML=h;document.getElementById('pTitle').textContent=p.name;}catch(e){el.innerHTML='<div class="err">'+e.message+'</div>';}}

// ═══════════════════
// UNIT DETAIL
// ═══════════════════
async function loadUnitDetail(el){
el.innerHTML='<div class="ld"><div class="sp"></div> Loading...</div>';
try{var d=await api('/api/banksia/units/'+cu),u=d.unit,p=d.property,tn=d.current_tenant;
var h='<div class="bk" onclick="nav(\'portfolio\','+(cp||1)+')">\u2190 '+(p?p.name:'')+'</div>'+
'<div class="dc"><div class="dch"><h3>'+u.name+'</h3>'+sbs(u.status)+'</div>'+
'<div class="sg" style="grid-template-columns:repeat(3,1fr)">'+
'<div><div class="dl">Rent</div><div class="dvv">\u00A3'+(u.rent_amount||0)+'</div></div>'+
'<div><div class="dl">Deposit</div><div class="dvv">\u00A3'+(u.deposit_amount||0)+'</div></div>'+
'<div><div class="dl">Open Jobs</div><div class="dvv">'+d.open_maintenance+'</div></div>'+
'</div></div>';
if(tn){h+='<div class="dc"><div class="dch"><h3>\uD83D\uDC64 '+tn.full_name+'</h3><span class="bk" onclick="nav(\'portfolio\','+cp+','+cu+',null,'+tn.id+')">View \u2192</span></div>'+
'<div class="sg">'+(tn.email?'<div><div class="dl">Email</div><div class="dvv">'+tn.email+'</div></div>':'')+(tn.phone?'<div><div class="dl">Phone</div><div class="dvv">'+tn.phone+'</div></div>':'')+'</div></div>';}
h+='<div class="dc"><div class="dch"><h3>Maintenance</h3></div>';if(d.maintenance&&d.maintenance.length){for(var i=0;i<d.maintenance.length;i++){h+='<div style="font-size:11px;padding:4px 0;border-bottom:1px solid #F1F5F9">'+d.maintenance[i].title+' '+sbs(d.maintenance[i].status)+'</div>';}}else h+='<div class="empty">None</div>';
el.innerHTML=h+'</div>';document.getElementById('pTitle').textContent=u.name;}catch(e){el.innerHTML='<div class="err">'+e.message+'</div>';}}

// ═══════════════════
// TENANCY DETAIL
// ═══════════════════
async function loadTenancyDetail(el){
el.innerHTML='<div class="ld"><div class="sp"></div> Loading...</div>';
try{var d=await api('/api/banksia/tenancies/'+ct);
var h='<div class="bk" onclick="nav(\'portfolio\','+(cp||1)+','+(cu||1)+')">\u2190 Back</div>'+
'<div class="dc"><div class="dch"><h3>Tenancy</h3></div>'+
'<div class="sg"><div><div class="dl">Rent</div><div class="dvv">\u00A3'+d.finance.rent+'/'+d.finance.rent_frequency+'</div></div>'+
'<div><div class="dl">Deposit</div><div class="dvv">\u00A3'+d.finance.deposit+'</div></div>'+
'<div><div class="dl">Arrears</div><div class="dvv" style="color:'+(d.finance.arrears>0?'#DC2626':'#16A34A')+'">\u00A3'+(d.finance.arrears||0)+'</div></div>'+
'<div><div class="dl">Start</div><div class="dvv">'+(d.tenancy.start_date||'—')+'</div></div>'+
'<div><div class="dl">End</div><div class="dvv">'+(d.tenancy.end_date||'—')+'</div></div>'+
'<div><div class="dl">Status</div><div class="dvv">'+sbs(d.tenancy.status)+'</div></div>'+
'</div></div>';
var tn=d.tenants&&d.tenants[0];if(tn){h+='<div class="dc"><div class="dch"><h3>'+tn.full_name+'</h3></div>'+
