<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banksia OS — HMO Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#0F172A;color:#e2e8f0;min-height:100vh;display:flex;overflow-x:hidden}
a{color:#60a5fa;text-decoration:none}
/* ── SIDEBAR ── */
.sidebar{width:240px;background:#1e293b;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transform:translateX(0);transition:transform .25s ease;border-right:1px solid rgba(255,255,255,.06)}
.sidebar .brand{padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar .brand h1{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.5px}
.sidebar .brand h1 span{color:#3b82f6}
.sidebar .brand .tagline{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:2px;margin-top:2px}
.sidebar .nav{padding:12px 0;flex:1;overflow-y:auto}
.sidebar .nav-item{display:flex;align-items:center;gap:12px;padding:10px 20px;color:#94a3b8;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border-left:3px solid transparent;position:relative}
.sidebar .nav-item:hover{color:#e2e8f0;background:rgba(255,255,255,.04)}
.sidebar .nav-item.active{color:#fff;background:rgba(59,130,246,.12);border-left-color:#3b82f6}
.sidebar .nav-item .icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sidebar .nav-item .badge{background:#3b82f6;color:#fff;font-size:10px;padding:2px 6px;border-radius:8px;margin-left:auto}
.sidebar .user-section{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:#64748b}
.sidebar .user-section .name{color:#e2e8f0;font-weight:600;font-size:13px}
/* ── MAIN ── */
.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#1e293b;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:50;min-height:60px}
.topbar .left{display:flex;align-items:center;gap:16px}
.topbar .hamburger{display:none;background:none;border:none;color:#94a3b8;font-size:22px;cursor:pointer;padding:4px}
.topbar .page-title{font-size:16px;font-weight:700;color:#f1f5f9}
.topbar .page-subtitle{font-size:12px;color:#64748b;margin-top:2px}
.topbar .right{display:flex;align-items:center;gap:16px}
.topbar .user-info{text-align:right}
.topbar .user-info .name{font-size:13px;font-weight:600;color:#e2e8f0}
.topbar .user-info .role{font-size:11px;color:#64748b}
.topbar .date-display{font-size:12px;color:#64748b;background:rgba(255,255,255,.04);padding:6px 12px;border-radius:8px}
.content{padding:24px 28px;flex:1}
/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:28px}
.kpi-card{background:#1e293b;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:18px 20px;transition:all .2s;cursor:default}
.kpi-card:hover{border-color:rgba(59,130,246,.3);transform:translateY(-1px)}
.kpi-card .label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.kpi-card .value{font-size:26px;font-weight:700;color:#f1f5f9;letter-spacing:-.5px}
.kpi-card .sub{font-size:12px;color:#64748b;margin-top:4px}
.kpi-card .value.green{color:#10b981}
.kpi-card .value.blue{color:#3b82f6}
.kpi-card .value.amber{color:#f59e0b}
.kpi-card .value.red{color:#ef4444}
.kpi-card .value.purple{color:#8b5cf6}
/* ── TABLES ── */
.table-wrap{background:#1e293b;border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden}
.table-toolbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.06);gap:12px;flex-wrap:wrap}
.table-toolbar .left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.table-toolbar .right{display:flex;align-items:center;gap:10px}
.table-toolbar input,.table-toolbar select{padding:8px 12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:13px;font-family:'Inter',sans-serif;outline:none}
.table-toolbar input:focus,.table-toolbar select:focus{border-color:#3b82f6}
.table-toolbar .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;border:none}
.btn-primary{background:#3b82f6;color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-success{background:#10b981;color:#fff}
.btn-success:hover{background:#059669}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-ghost{background:transparent;color:#94a3b8;border:1px solid #334155}
.btn-ghost:hover{background:rgba(255,255,255,.04);color:#e2e8f0}
.btn-sm{padding:6px 10px;font-size:12px}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid rgba(255,255,255,.06);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:#94a3b8}
thead th .sort-icon{display:inline-block;margin-left:4px;opacity:.4}
tbody td{padding:10px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody tr{cursor:pointer}
tbody tr:last-child td{border-bottom:none}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;font-size:13px;color:#64748b}
.pagination .page-btn{padding:6px 12px;border-radius:6px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif}
.pagination .page-btn:disabled{opacity:.3;cursor:not-allowed}
.pagination .page-btn:hover:not(:disabled){background:rgba(255,255,255,.06)}
/* ── BADGES ── */
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge-active{background:rgba(16,185,129,.15);color:#10b981}
.badge-inactive{background:rgba(100,116,139,.15);color:#94a3b8}
.badge-pending{background:rgba(245,158,11,.15);color:#f59e0b}
.badge-new{background:rgba(59,130,246,.15);color:#60a5fa}
.badge-viewing{background:rgba(245,158,11,.15);color:#f59e0b}
.badge-application{background:rgba(139,92,246,.15);color:#a78bfa}
.badge-referencing{background:rgba(249,115,22,.15);color:#fb923c}
.badge-guarantor{background:rgba(236,72,153,.15);color:#f472b6}
.badge-approved{background:rgba(16,185,129,.15);color:#34d399}
.badge-agreement,.badge-signature{background:rgba(59,130,246,.15);color:#60a5fa}
.badge-move-in{background:rgba(16,185,129,.15);color:#10b981}
.badge-rejected{background:rgba(239,68,68,.15);color:#ef4444}
.badge-withdrawn{background:rgba(100,116,139,.15);color:#94a3b8}
.badge-vacant{background:rgba(239,68,68,.15);color:#ef4444}
.badge-occupied{background:rgba(16,185,129,.15);color:#10b981}
/* ── DETAIL PANEL ── */
.detail-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200}
.detail-overlay.open{display:block}
.detail-panel{position:fixed;top:0;right:-600px;width:580px;max-width:100vw;bottom:0;background:#1e293b;border-left:1px solid rgba(255,255,255,.08);z-index:201;transition:right .3s ease;overflow-y:auto;box-shadow:-10px 0 30px rgba(0,0,0,.4)}
.detail-panel.open{right:0}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;background:#1e293b;z-index:2}
.detail-header h2{font-size:18px;font-weight:700;color:#f1f5f9}
.detail-header .close-btn{background:none;border:none;color:#64748b;font-size:22px;cursor:pointer;padding:4px}
.detail-header .close-btn:hover{color:#e2e8f0}
.detail-body{padding:20px 24px}
.detail-section{margin-bottom:24px}
.detail-section h3{font-size:13px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-field{}
.detail-field .label{font-size:11px;color:#64748b;margin-bottom:2px}
.detail-field .val{font-size:13px;color:#e2e8f0;word-break:break-word}
.detail-field .val.full{grid-column:1/-1}
/* ── FORMS ── */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#1e293b;border:1px solid rgba(255,255,255,.08);border-radius:16px;width:480px;max-width:90vw;max-height:90vh;overflow-y:auto;padding:28px 32px}
.modal h2{font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.modal .sub{font-size:13px;color:#64748b;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:500;color:#94a3b8;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:13px;font-family:'Inter',sans-serif;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.form-actions .btn{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:none;transition:all .15s}
.form-actions .btn-cancel{background:transparent;color:#94a3b8;border:1px solid #334155}
.form-actions .btn-cancel:hover{color:#e2e8f0}
.form-actions .btn-submit{background:#3b82f6;color:#fff}
.form-actions .btn-submit:hover{background:#2563eb}
/* ── APPLICANT PIPELINE ── */
.pipeline{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;min-height:60vh}
.pipeline-col{flex:0 0 220px;min-width:200px;background:#1e293b;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px;display:flex;flex-direction:column}
.pipeline-col .col-header{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between}
.pipeline-col .col-header .count{background:rgba(255,255,255,.06);padding:2px 7px;border-radius:6px;font-size:11px}
.pipeline-card{background:#0f172a;border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.pipeline-card:hover{border-color:rgba(59,130,246,.3);transform:translateY(-1px)}
.pipeline-card .name{font-size:13px;font-weight:600;color:#e2e8f0}
.pipeline-card .meta{font-size:11px;color:#64748b;margin-top:4px;display:flex;flex-direction:column;gap:2px}
/* ── SEARCH ── */
.search-bar{display:flex;gap:8px;margin-bottom:24px}
.search-bar input{flex:1;padding:12px 16px;border-radius:10px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:15px;font-family:'Inter',sans-serif;outline:none}
.search-bar input:focus{border-color:#3b82f6}
.search-bar .btn{padding:12px 20px}
.search-group{margin-bottom:24px}
.search-group h3{font-size:14px;font-weight:600;color:#94a3b8;margin-bottom:10px;text-transform:capitalize}
.search-item{padding:10px 14px;background:#1e293b;border:1px solid rgba(255,255,255,.06);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.search-item:hover{border-color:rgba(59,130,246,.3)}
.search-item .title{font-size:13px;font-weight:600;color:#e2e8f0}
.search-item .desc{font-size:11px;color:#64748b;margin-top:2px}
/* ── FINANCE ── */
.finance-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:24px}
.finance-card{background:#1e293b;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:18px 20px}
.finance-card .label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.finance-card .value{font-size:22px;font-weight:700;color:#f1f5f9}
.finance-card .value.green{color:#10b981}
.finance-card .value.red{color:#ef4444}
.finance-card .value.blue{color:#3b82f6}
/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 20px;color:#64748b}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state h3{color:#94a3b8;font-size:16px;margin-bottom:4px}
.empty-state p{font-size:13px}
/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:#64748b;font-size:14px}
.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.08);border-top-color:#3b82f6;border-radius:50%;animation:spin .6s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;max-width:400px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:#10b981;color:#fff}
.toast.error{background:#ef4444;color:#fff}
.toast.info{background:#3b82f6;color:#fff}
/* ── RENT COLLECTION ── */
.rent-collection{display:flex;flex-direction:column;gap:8px}
.rent-collection .rc-header{display:flex;justify-content:space-between;font-size:13px;color:#94a3b8}
.rent-collection .rc-header .rc-collected{color:#10b981;font-weight:600}
.rent-collection .rc-header .rc-expected{color:#94a3b8}
.rent-collection .rc-bar{height:10px;background:#0f172a;border-radius:6px;overflow:hidden;position:relative}
.rent-collection .rc-bar .rc-fill{height:100%;border-radius:6px;transition:width .6s ease;background:linear-gradient(90deg,#10b981,#34d399)}
.rent-collection .rc-bar .rc-fill.warning{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.rent-collection .rc-bar .rc-fill.danger{background:linear-gradient(90deg,#ef4444,#f87171)}
.rent-collection .rc-stats{display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-top:2px}
.rent-collection .rc-stats .rc-pct{font-weight:600;color:#e2e8f0}
/* ── ALERTS ── */
.alert-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .15s}
.alert-item:last-child{border-bottom:none}
.alert-item:hover{background:rgba(255,255,255,.02)}
.alert-item .alert-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.alert-item .alert-icon.warning{background:rgba(245,158,11,.15);color:#f59e0b}
.alert-item .alert-icon.danger{background:rgba(239,68,68,.15);color:#ef4444}
.alert-item .alert-icon.info{background:rgba(59,130,246,.15);color:#60a5fa}
.alert-item .alert-icon.success{background:rgba(16,185,129,.15);color:#10b981}
.alert-item .alert-body{flex:1}
.alert-item .alert-body .alert-title{font-size:13px;font-weight:600;color:#e2e8f0}
.alert-item .alert-body .alert-desc{font-size:12px;color:#64748b;margin-top:2px}
.alert-item .alert-action{font-size:12px;color:#3b82f6;font-weight:500;white-space:nowrap}
/* ── RENEWAL ITEMS ── */
.renewal-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .15s}
.renewal-item:last-child{border-bottom:none}
.renewal-item:hover{background:rgba(255,255,255,.02)}
.renewal-item .renewal-info{flex:1}
.renewal-item .renewal-info .renewal-tenant{font-size:13px;font-weight:600;color:#e2e8f0}
.renewal-item .renewal-info .renewal-meta{font-size:11px;color:#64748b;margin-top:2px}
.renewal-item .renewal-date{font-size:12px;color:#f59e0b;white-space:nowrap}
.kpi-card{cursor:pointer}
/* ── RESPONSIVE ── */
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.main{margin-left:0}
.topbar .hamburger{display:block}
.kpi-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
.detail-panel{width:100vw}
.form-row{grid-template-columns:1fr}
.pipeline{flex-direction:column}
.pipeline-col{flex:1 1 auto}
}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#475569}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="brand">
    <h1>Banksia<span>OS</span></h1>
    <div class="tagline">HMO Operations</div>
  </div>
  <div class="nav">
    <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
      <span class="icon">📊</span> Dashboard
    </div>
    <div class="nav-item" data-page="properties" onclick="navigate('properties')">
      <span class="icon">🏘️</span> Properties
    </div>
    <div class="nav-item" data-page="units" onclick="navigate('units')">
      <span class="icon">🚪</span> Units
    </div>
    <div class="nav-item" data-page="tenancies" onclick="navigate('tenancies')">
      <span class="icon">📋</span> Tenancies
    </div>
    <div class="nav-item" data-page="tenants" onclick="navigate('tenants')">
      <span class="icon">👤</span> Tenants
    </div>
    <div class="nav-item" data-page="applicants" onclick="navigate('applicants')">
      <span class="icon">📝</span> Applicants
    </div>
    <div class="nav-item" data-page="finance" onclick="navigate('finance')">
      <span class="icon">💰</span> Finance
    </div>
    <div class="nav-item" data-page="search" onclick="navigate('search')">
      <span class="icon">🔍</span> Search
    </div>
    <div class="nav-item" data-page="documents" onclick="navigate('documents')">
      <span class="icon">📄</span> Documents
    </div>
    <div class="nav-item" data-page="access" onclick="navigate('access')">
      <span class="icon">🔑</span> Access
    </div>
    <div class="nav-item" data-page="users" onclick="navigate('users')">
      <span class="icon">👥</span> Users
    </div>
  </div>
  <div class="user-section">
    <div class="name" id="sidebar-user-name">{{ user.username }}</div>
    <div style="margin-top:4px">{{ user.role }}</div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main-content">
  <div class="topbar">
    <div class="left">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <div>
        <div class="page-title" id="page-title">Dashboard</div>
        <div class="page-subtitle" id="page-subtitle">HMO operations overview</div>
      </div>
    </div>
    <div class="right">
      <div class="user-info">
        <div class="name">{{ user.username }}</div>
        <div class="role">{{ user.role }}</div>
      </div>
      <div class="date-display" id="date-display"></div>
    </div>
  </div>
  <div class="content" id="page-content"></div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <h2 id="detail-title">Detail</h2>
    <button class="close-btn" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content" onclick="e=>e.stopPropagation()">
    <div id="modal-inner"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const user = {{ user | tojson | safe }};
const API = '/api/banksia-os';

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('date-display').textContent = new Date().toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  navigate('dashboard');
});

// ── NAVIGATION ──
function navigate(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.querySelector(`.nav-item[data-page="${page}"]`);
  if (nav) nav.classList.add('active');
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
  closeDetail();
  renderPage(page);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ── DETAIL PANEL ──
function openDetail(title, html) {
  document.getElementById('detail-title').textContent = title;
  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}
function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
}

// ── MODAL ──
function openModal(html) {
  document.getElementById('modal-inner').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── TOAST ──
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── API HELPER ──
async function api(path, opts={}) {
  const res = await fetch(API + path, {
    headers: {'Content-Type':'application/json','Accept':'application/json'},
    ...opts
  });
  const data = await res.json();
  if (!data.success) throw new Error(data.error || 'API error');
  return data;
}

// ── FORMATTERS ──
function fmtDate(d) { if (!d) return '—'; try{return new Date(d).toLocaleDateString('en-GB')}catch(e){return d} }
function fmtMoney(n) { if (n==null) return '—'; return '£' + Number(n).toLocaleString('en-GB', {minimumFractionDigits:2,maximumFractionDigits:2}) }
function fmtPct(n) { if (n==null) return '—'; return Number(n).toFixed(1) + '%' }
function statusBadge(s) {
  const map = {'active':'badge-active','inactive':'badge-inactive','pending':'badge-pending','vacant':'badge-vacant','occupied':'badge-occupied',
    'new':'badge-new','viewing':'badge-viewing','application':'badge-application','referencing':'badge-referencing','guarantor':'badge-guarantor',
    'approved':'badge-approved','agreement':'badge-agreement','signature':'badge-signature','move in':'badge-move-in','move_in':'badge-move-in','rejected':'badge-rejected','withdrawn':'badge-withdrawn',
    'available':'badge-vacant','tenanted':'badge-occupied','periodic':'badge-active','fixed term':'badge-active'};
  const cls = map[(s||'').toLowerCase()] || 'badge-pending';
  return `<span class="badge ${cls}">${escHtml(s||'Unknown')}</span>`;
}
function escHtml(s) { if (s==null) return ''; const d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }

function paginationControls(state, fnName) {
  const totalPages = Math.ceil(state.total / state.perPage) || 1;
  return `<div class="pagination"><span>${state.total} total — Page ${state.page} of ${totalPages}</span><div><button class="page-btn" onclick="${fnName}(${state.page-1})" ${state.page<=1?'disabled':''}>← Prev</button><button class="page-btn" style="margin-left:6px" onclick="${fnName}(${state.page+1})" ${state.page>=totalPages?'disabled':''}>Next →</button></div></div>`;
}
async function renderProperties() {

async function showTenancy(id) {
  try {
    const [tenRes, rentRes] = await Promise.all([
      api(`/tenancies/${id}`),
      api(`/finance/rent-schedule/${id}`).catch(() => null)
    ]);
    const t = tenRes.data;
    const schedule = rentRes ? rentRes.data : null;
    let html = `<div class="detail-section"><h3>Tenancy Details</h3><div class="detail-grid">`;
    const fields = [['Ref','ref'],['Status','status'],['Full Address','full_address'],['Tenancy Type','tenancy_type'],['Contract Type','contract_type'],['Start Date','start_date'],['End Date','end_date'],['Renewal Start','renewal_start'],['Renewal End','renewal_end'],['Break Clause','break_clause_date'],['Notice Period','notice_period'],['Move In Date','move_in_date'],['Move Out Date','move_out_date'],['Rent Amount','rent_amount'],['Rent Frequency','rent_frequency'],['Deposit Held By','deposit_held_by'],['Deposit Scheme','deposit_scheme'],['Deposit Registered Amount','deposit_registered_amount'],['Rent Review Date','rent_review_date'],['Section 21 Served','section_21_served'],['Rent Payment Bank','rent_payment_bank'],['Notes','notes']];
    fields.forEach(([l,f]) => {
      const v = t[f];
      if (v!=null && v!=='') {
        let val = escHtml(v);
        if (f.includes('rent')||f.includes('deposit')) val = fmtMoney(v);
        if (f==='section_21_served') val = v ? 'Yes' : 'No';
        if (f.includes('date')) val = fmtDate(v);
        html += `<div class="detail-field"><div class="label">${l}</div><div class="val">${val}</div></div>`;
      }
    });
    html += '</div></div>';
    // Tenants on this tenancy
    if (t.tenants && t.tenants.length > 0) {
      html += '<div class="detail-section"><h3>Tenants (' + t.tenants.length + ')</h3>';
      const tnts = typeof t.tenants === 'string' ? JSON.parse(t.tenants) : t.tenants;
      if (Array.isArray(tnts)) {
        tnts.forEach(tn => {
          const name = typeof tn === 'string' ? tn : (tn.name||tn.first_name+' '+tn.last_name||'—');
          html += `<div style="padding:8px 12px;background:#0f172a;border-radius:8px;margin-bottom:4px;font-size:13px">${escHtml(name)}</div>`;
        });
      }
      html += '</div>';
    }
    // Rent Schedule
    if (schedule && schedule.payments && schedule.payments.length > 0) {
      html += '<div class="detail-section"><h3>Rent Schedule (' + schedule.payments.length + ' payments)</h3>';
      html += '<table><thead><tr><th>#</th><th>Due Date</th><th>Amount</th><th>Period</th></tr></thead><tbody>';
      schedule.payments.forEach((p,i) => {
        html += `<tr><td>${i+1}</td><td>${fmtDate(p.due_date||p.date)}</td><td>${fmtMoney(p.amount)}</td><td>${escHtml(p.period||'')}</td></tr>`;
      });
      html += '</tbody></table></div>';
    }
    // Finance summary from tenancy-summary API
    try {
      const finRes = await api(`/finance/tenancy-summary/${id}`);
      const fin = finRes.data;
      html += `<div class="detail-section"><h3>Financial Summary</h3><div class="detail-grid">
        <div class="detail-field"><div class="label">Total Expected</div><div class="val">${fmtMoney(fin.total_expected)}</div></div>
        <div class="detail-field"><div class="label">Total Paid</div><div class="val" style="color:#10b981">${fmtMoney(fin.total_paid)}</div></div>
        <div class="detail-field"><div class="label">Balance</div><div class="val" style="color:${(fin.balance||0)>=0?'#10b981':'#ef4444'}">${fmtMoney(fin.balance)}</div></div>
        <div class="detail-field"><div class="label">Next Payment</div><div class="val">${fmtDate(fin.next_payment_date)}</div></div>
        <div class="detail-field"><div class="label">Arrears</div><div class="val" style="color:#ef4444">${fmtMoney(fin.arrears)}</div></div>
      </div></div>`;
    } catch(e) {}
    // End tenancy button
    if (t.status && t.status.toLowerCase() !== 'ended') {
      html += `<div class="detail-section" style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-success btn-sm" onclick="showRenewForm(${t.id})">🔄 Renew</button>
        <button class="btn btn-primary btn-sm" onclick="showRentReviewForm(${t.id})">📈 Rent Review</button>
        <button class="btn btn-amber btn-sm" style="background:#d97706;color:#fff" onclick="showSection21Form(${t.id})">⚖️ Section 21</button>
        <button class="btn btn-danger btn-sm" onclick="showEndTenancyForm(${t.id})">End Tenancy</button>
      </div>`;
    }
    openDetail('Tenancy ' + (t.ref||'#'+id), html);
  } catch(e) {
    showToast('Failed to load tenancy: ' + e.message, 'error');
  }
}

    property_id: parseInt(document.getElementById('newten-prop').value),

let searchTerm = '';
async function renderSearch() {
  const el = document.getElementById('page-content');
  el.innerHTML = `
    <div class="search-bar">
      <input id="search-input" placeholder="Search properties, tenancies, tenants, applicants..." value="${escHtml(searchTerm)}" onkeyup="if(event.key==='Enter'){searchTerm=this.value;doSearch()}">
      <button class="btn btn-primary" onclick="searchTerm=document.getElementById('search-input').value;doSearch()">Search</button>
    </div>
    <div id="search-results"></div>
  `;
  if (searchTerm) doSearch();
}
async function doSearch() {
  const el = document.getElementById('search-results');
  if (!searchTerm) { el.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><h3>Enter a search term</h3><p>Search across properties, units, tenancies, tenants, and applicants</p></div>'; return; }
  el.innerHTML = '<div class="loading"><div class="spinner"></div>Searching...</div>';
  try {
    const res = await api(`/search?q=${encodeURIComponent(searchTerm)}&type=all`);
    const data = res.data || {};
    const groups = ['properties','units','tenancies','tenants','applicants'];
    let html = '';
    let total = 0;
    groups.forEach(key => {
      const items = data[key] || [];
      total += items.length;
      if (items.length > 0) {
        html += `<div class="search-group"><h3>${key.charAt(0).toUpperCase()+key.slice(1)} (${items.length})</h3>`;
        items.forEach(item => {
          let title = '', desc = '';
          if (key==='properties') { title = item.name||item.ref||''; desc = item.address_line_1+', '+item.city; }
          else if (key==='units') { title = item.unit_ref||item.full_address||''; desc = item.unit_type+' — '+fmtMoney(item.market_rent); }
          else if (key==='tenancies') { title = item.main_tenant_name||item.ref||''; desc = item.full_address+' | '+fmtMoney(item.rent_amount); }
          else if (key==='tenants') { title = (item.first_name||'')+' '+(item.last_name||''); desc = item.email||item.phone||''; }
          else if (key==='applicants') { title = (item.first_name||'')+' '+(item.last_name||''); desc = item.property_interest||item.email||''; }
          const id = item.id;
          html += `<div class="search-item" onclick="navigateToResult('${key}',${id})">
            <div class="title">${escHtml(title||'—')}</div>
            <div class="desc">${escHtml(desc||'')}</div>
          </div>`;
        });
        html += '</div>';
      }
    });
    if (total===0) {
      html = '<div class="empty-state"><div class="icon">🔍</div><h3>No results</h3><p>No matches found for "'+escHtml(searchTerm)+'"</p></div>';
    }
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>Search failed</h3><p>${escHtml(e.message)}</p></div>`;
  }
}
function navigateToResult(type, id) {
  const map = { properties:'properties', units:'units', tenancies:'tenancies', tenants:'tenants', applicants:'applicants' };
  const page = map[type] || 'search';
  navigate(page);
  setTimeout(() => {
    const fns = { properties: showProperty, units: showUnit, tenancies: showTenancy, tenants: showTenant, applicants: showApplicant };
    const fn = fns[type];
    if (fn) fn(id);
  }, 200);
}

        const email = u.email || '';
        html += `<tr>
          <td><strong>${escHtml(uname)}</strong></td>
          <td>${statusBadge(role)}</td>
          <td>${escHtml(email)}</td>
          <td>${uname !== 'Sami' ? `<button class="btn btn-sm btn-danger" onclick="deleteUser('${escHtml(uname)}')">✕</button>` : ''}</td>
        </tr>`;
      });
      html += '</tbody></table>';
    }
    html += '</div>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>Failed to load users</h3><p>${escHtml(e.message)}</p></div>`;
  }
}
function showAddUserForm() {
  openModal(`
    <h2>Add User</h2>
    <div class="sub">Create a new team member account</div>
    <div class="form-group"><label>Username</label><input type="text" id="nu-user" placeholder="e.g. jane"></div>
    <div class="form-group"><label>Email</label><input type="email" id="nu-email" placeholder="e.g. jane@vervrooms.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="nu-pass" placeholder="Set initial password"></div>
    <div class="form-group"><label>Role</label><select id="nu-role"><option value="admin">Admin</option><option value="super_admin">Super Admin</option><option value="projects">Projects (limited)</option></select></div>
    <div class="form-actions">
      <button class="btn btn-cancel" onclick="closeModal(event)">Cancel</button>
      <button class="btn btn-submit" onclick="submitAddUser()">Add User</button>
    </div>
  `);
}
async function submitAddUser() {
  const payload = {
    username: document.getElementById('nu-user').value,
    email: document.getElementById('nu-email').value,
    password: document.getElementById('nu-pass').value,
    role: document.getElementById('nu-role').value
  };
  if (!payload.username || !payload.password) { showToast('Username and password required', 'error'); return; }
  try {
    const res = await fetch('/api/users', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    closeModal(null);
    showToast('User added');
    renderUsers();
  } catch(e) { showToast('Failed: ' + e.message, 'error'); }
}
async function deleteUser(username) {
  if (!confirm('Delete user ' + username + '?')) return;
  try {
    const res = await fetch('/api/users/' + encodeURIComponent(username), { method:'DELETE' });
    if (!res.ok) throw new Error('Failed');
    showToast('User deleted');
    renderUsers();
  } catch(e) { showToast('Failed: ' + e.message, 'error'); }
}

// ── PROPERTY IMAGE UPLOAD ──
async function uploadPropertyImage(propId) {
  openModal(`
    <h2>Upload Image</h2>
    <div class="sub">Add a photo or document to this property</div>
    <div class="form-group"><label>Category (optional)</label><select id="upimg-cat"><option value="">General</option><option value="exterior">Exterior</option><option value="interior">Interior</option><option value="floorplan">Floor Plan</option><option value="epc">EPC</option><option value="document">Document</option></select></div>
    <div class="form-group"><label>Image File</label><input type="file" id="upimg-file" accept="image/*"></div>
    <div class="form-actions">
      <button class="btn btn-cancel" onclick="closeModal(event)">Cancel</button>
      <button class="btn btn-submit" onclick="submitUploadImage(${propId})">Upload</button>
    </div>
  `);
}
async function submitUploadImage(propId) {
  const fileInput = document.getElementById('upimg-file');
  const file = fileInput.files[0];
  if (!file) { showToast('Select an image file', 'error'); return; }
  const category = document.getElementById('upimg-cat').value;
  const formData = new FormData();
  formData.append('image', file);
  if (category) formData.append('category', category);
  try {
    const res = await fetch(API + `/properties/${propId}/images/upload`, { method:'POST', body:formData });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    closeModal(null);
    showToast('Image uploaded');
    closeDetail();
    setTimeout(() => showProperty(propId), 200);
  } catch(e) {
    showToast('Upload failed: ' + e.message, 'error');
  }
}
</script>
