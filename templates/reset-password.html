<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Banksia OS — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Inter',-apple-system,sans-serif;
background:linear-gradient(135deg,#0F172A 0%,#1E293B 50%,#0F172A 100%);
min-height:100vh;display:flex;align-items:center;justify-content:center;
padding:20px;position:relative;overflow:hidden
}
body::before{
content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
background:radial-gradient(circle at 30% 40%,rgba(59,130,246,.08) 0%,transparent 50%),
radial-gradient(circle at 70% 60%,rgba(139,92,246,.06) 0%,transparent 50%);
z-index:0
}
.dots{position:absolute;width:100%;height:100%;top:0;left:0;z-index:0;overflow:hidden;opacity:.03}
.dots span{position:absolute;width:4px;height:4px;background:#60A5FA;border-radius:50%}
.wrap{position:relative;z-index:1;width:100%;max-width:420px}
.logo-area{text-align:center;margin-bottom:28px}
.logo-area .logo{font-size:28px;font-weight:800;color:#fff;letter-spacing:-1px}
.logo-area .logo span{color:#3B82F6}
.logo-area .sub{font-size:14px;color:#94A3B8;margin-top:6px}
.card{background:#1E293B;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:32px;box-shadow:0 25px 50px -12px rgba(0,0,0,.5)}
.card h2{color:#F1F5F9;font-size:18px;font-weight:700;margin-bottom:4px}
.card .desc{color:#64748B;font-size:14px;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;color:#94A3B8;font-size:13px;font-weight:500;margin-bottom:6px}
.form-group input{
width:100%;padding:12px 16px;border-radius:12px;border:1px solid #334155;
background:#0F172A;color:#F1F5F9;font-size:15px;font-family:'Inter',sans-serif;
outline:none;transition:all .2s
}
.form-group input:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.btn{
width:100%;padding:14px;border:none;border-radius:12px;
background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;
font-size:15px;font-weight:600;font-family:'Inter',sans-serif;
cursor:pointer;transition:all .2s;margin-top:4px
}
.btn:hover{background:linear-gradient(135deg,#60A5FA,#3B82F6);transform:translateY(-1px);box-shadow:0 8px 25px rgba(59,130,246,.3)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.msg{padding:10px 14px;border-radius:10px;font-size:13px;text-align:center;margin-bottom:16px;display:none}
.msg.error{display:block;color:#EF4444;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2)}
.msg.success{display:block;color:#22C55E;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2)}
.back-link{text-align:center;margin-top:16px}
.back-link a{color:#64748B;font-size:13px;text-decoration:none;transition:color .2s}
.back-link a:hover{color:#94A3B8}
</style>
</head>
<body>
<div class="dots">
<span style="top:15%;left:10%"></span><span style="top:60%;right:15%"></span>
<span style="top:80%;left:25%"></span><span style="top:30%;right:35%"></span>
</div>
<div class="wrap">
<div class="logo-area">
<div class="logo">BANKSIA<span>.</span></div>
<div class="sub">Reset your password</div>
</div>
<div class="card" id="stepEmail">
<div class="msg" id="statusMsg"></div>
<h2>Forgot password?</h2>
<div class="desc">Enter your email address and we'll help you reset it.</div>
<form onsubmit="sendReset(event)">
<div class="form-group">
<label>Email address</label>
<input type="email" id="resetEmail" placeholder="Enter your email" required autofocus>
</div>
<button type="submit" class="btn" id="resetBtn">Send Reset Link</button>
</form>
<div class="back-link"><a href="/">← Back to login</a></div>
</div>
</div>
<script>
async function sendReset(e) {
e.preventDefault();
const email = document.getElementById('resetEmail').value.trim();
const btn = document.getElementById('resetBtn');
const msg = document.getElementById('statusMsg');
btn.disabled = true; btn.textContent = 'Sending...';
msg.className = 'msg';
try {
const r = await fetch('/api/auth/forgot-password', {
method:'POST', headers:{'Content-Type':'application/json'},
body: JSON.stringify({email})
});
const d = await r.json();
msg.textContent = d.message || 'If this email is registered, a reset link has been sent.';
msg.className = 'msg success';
document.getElementById('stepEmail').innerHTML = '<div class="msg success">' + msg.textContent + '</div><div class="desc" style="margin-top:12px;text-align:center;color:#64748B;font-size:13px">Check your email for the reset link.</div><div class="back-link"><a href="/">← Back to login</a></div>';
} catch(e) {
msg.textContent = 'Connection error. Please try again.';
msg.className = 'msg error';
btn.disabled = false; btn.textContent = 'Send Reset Link';
}
}
</script>
</body>
</html>
